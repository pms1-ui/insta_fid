<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>인스타그램 카드 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Wanted Sans Variable","Wanted Sans","Apple SD Gothic Neo",sans-serif;background:#f0f0f0;font-size:13px;color:#222;height:100vh;overflow:hidden}
.wrap{display:flex;height:100vh}

/* ── 왼쪽 50% ── */
.left{width:50%;overflow-y:auto;padding:14px 16px;border-right:2px solid #e0e0e0;background:#f8f8f8}
.panel{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ptitle{font-size:11px;font-weight:700;color:#F37E1F;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.srow:last-child{margin-bottom:0}
.slbl{font-size:12px;color:#666;white-space:nowrap;width:110px;flex-shrink:0}
.srow input[type=text]{flex:1;border:1.5px solid #e0e0e0;border-radius:7px;padding:6px 9px;font-size:13px;font-family:inherit;outline:none}
.srow input[type=text]:focus{border-color:#F37E1F}
.fbtn{display:inline-flex;align-items:center;gap:4px;background:#f5f5f5;border:1.5px solid #ddd;border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.fbtn:hover{background:#fff3e0;border-color:#F37E1F}
.fname{font-size:11px;color:#aaa;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── 카드 블록 ── */
.card-block{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;background:#fff8f0;padding:9px 14px;border-bottom:2px solid #ffe0c0;flex-wrap:wrap;gap:6px}
.card-title{font-weight:800;font-size:13px;color:#c05a00}
.card-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
/* 색상 피커 */
.color-row{display:flex;align-items:center;gap:10px;padding:6px 14px;background:#fffaf5;border-bottom:1px solid #ffe0c0}
.color-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;font-weight:600}
.color-item input[type=color]{width:28px;height:24px;border:1.5px solid #ddd;border-radius:5px;cursor:pointer;padding:1px;background:#fff}
.color-preview{display:inline-block;width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.15);vertical-align:middle}
.card-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* ── 상품 박스 (흰색 카드 1개 = 상품 1개) ── */
.prod-box{background:#f9f9f9;border:1.5px solid #eee;border-radius:10px;padding:10px;display:flex;gap:10px;align-items:flex-start;position:relative}
.prod-box-num{position:absolute;top:8px;left:8px;background:#F37E1F;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:2px 8px}
.prod-img-col{flex-shrink:0;margin-top:22px}
.thumb{width:96px;height:72px;border-radius:7px;border:2px dashed #ddd;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;font-size:10px;color:#bbb;gap:2px;transition:.15s}
.thumb:hover{border-color:#F37E1F;color:#F37E1F}
.thumb img{width:100%;height:100%;object-fit:contain;background:#fff}
.prod-fields{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:22px}
.full{grid-column:1/-1}
.flbl{font-size:10px;color:#888;margin-bottom:2px;font-weight:600}
.prod-fields input{width:100%;border:1.5px solid #e0e0e0;border-radius:6px;padding:5px 7px;font-size:12px;font-family:inherit;outline:none}
.prod-fields input:focus{border-color:#F37E1F}
.prod-del{flex-shrink:0;margin-top:22px}

/* ── 버튼 ── */
.btn{border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:.15s}
.b-or{background:#F37E1F;color:#fff}.b-or:hover{background:#d96a10}
.b-gr{background:#4CAF50;color:#fff}.b-gr:hover{background:#388E3C}
.b-rd{background:#ff5252;color:#fff;padding:4px 9px;font-size:11px}.b-rd:hover{background:#c62828}
.b-bl{background:#2196F3;color:#fff}.b-bl:hover{background:#1565C0}
.b-gy{background:#e8e8e8;color:#555}.b-gy:hover{background:#d0d0d0}
.b-ap{background:#fff3e0;color:#F37E1F;border:1.5px solid #F37E1F;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.b-ap:hover{background:#ffe0b2}
.actions{display:flex;gap:8px;padding-bottom:20px;margin-top:4px}

/* ── 오른쪽 미리보기 50% ── */
.right{width:50%;background:#1a1a1a;display:flex;flex-direction:column;overflow:hidden}
.prev-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #333;flex-shrink:0}
.prev-title{color:#aaa;font-size:12px;font-weight:600;letter-spacing:.4px}
.prev-nav{display:flex;align-items:center;gap:10px}
.nav-btn{background:#333;color:#fff;border:none;border-radius:6px;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.nav-btn:hover{background:#555}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{color:#888;font-size:12px;min-width:60px;text-align:center}
.prev-area{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px}
.prev-canvas-wrap{position:relative;height:100%;display:flex;align-items:center;justify-content:center}
#prev-canvas{max-height:100%;max-width:100%;border-radius:8px;display:block}
.prev-bottom{padding:10px 16px;border-top:1px solid #333;display:flex;gap:8px;flex-shrink:0}
.prev-bottom .btn{flex:1;justify-content:center;padding:8px}
</style>
</head>
<body>
<div class="wrap">

<!-- ══ 왼쪽 입력 ══ -->
<div class="left">
  <div class="panel">
    <div class="ptitle">📋 기본 설정</div>
    <div class="srow">
      <span class="slbl">진행기간</span>
      <input type="text" id="period" value="26. 05. 13 11:00 - 05. 16 23:59">
    </div>
    <div class="srow">
      <span class="slbl">업체/인플루언서명</span>
      <input type="text" id="brand" value="레이첼민선">
    </div>
    <div class="srow">
      <span class="slbl">로고 이미지</span>
      <label class="fbtn" for="logo-file">📎 로고 선택</label>
      <input type="file" id="logo-file" accept="image/*" style="display:none">
      <span class="fname" id="logo-name">선택 안 됨</span>
    </div>
  </div>

  <div id="cards"></div>

  <div class="actions">
    <button class="btn b-gr" onclick="addCard()">＋ 카드 추가</button>
    <button class="btn b-gy" onclick="renderCurrent()">🔄 갱신</button>
  </div>
</div>

<!-- ══ 오른쪽 미리보기 ══ -->
<div class="right">
  <div class="prev-top">
    <div class="prev-title">미리보기 — 1080 × 1350</div>
    <div class="prev-nav">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀</button>
      <span class="nav-info" id="nav-info">1 / 1</span>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">▶</button>
    </div>
  </div>
  <div class="prev-area">
    <div class="prev-canvas-wrap">
      <canvas id="prev-canvas" width="1080" height="1350"></canvas>
    </div>
  </div>
  <div class="prev-bottom">
    <button class="btn b-bl" onclick="fullView()">🔍 전체보기</button>
    <button class="btn b-or" onclick="downloadCurrent()">⬇ 현재 저장</button>
    <button class="btn b-gy" onclick="downloadAll()">⬇ 전체 저장</button>
  </div>
</div>

</div>

<script>
// ══ 상수 ══════════════════════════════════════════════════════════════════════
const CW=1080, CH=1350;
const BG='#F37E1F', WHITE='#fff', DARK='#1c1c1c', GRAY='#969696', ORANGE='#F37E1F';
const DATE_C='rgba(255,220,175,1)';
const FONT='"Wanted Sans Variable","Wanted Sans","Apple SD Gothic Neo",sans-serif';
const DATE_CY=107, BRAND_Y=186, HEADER_H=338;
const CARD_MX=30, CARD_R=22, CARD_GAP=24, BOTTOM=50, CARD_PAD=28;

// ══ 상태 ══════════════════════════════════════════════════════════════════════
let logoImg=null, cardSeq=0, prodSeq=0, timer=null;
const prodImgs={};
let currentCard=0;   // 현재 보고 있는 카드 인덱스

const fontReady=(async()=>{
  try{
    await document.fonts.load(`800 80px ${FONT}`);
    await document.fonts.load(`400 28px ${FONT}`);
  }catch(e){}
})();

// ══ Canvas 유틸 ══════════════════════════════════════════════════════════════
function rrect(ctx,x,y,w,h,r,fill){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
}

// contain: 비율 유지, 여백 흰색
function drawContain(ctx,img,x,y,w,h){
  const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  const s=Math.min(w/iw,h/ih);
  const nw=iw*s, nh=ih*s;
  ctx.fillStyle='#fff';ctx.fillRect(x,y,w,h);
  ctx.drawImage(img,x+(w-nw)/2,y+(h-nh)/2,nw,nh);
}

function drawPH(ctx,x,y,w,h){
  ctx.fillStyle='#efefef';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#ddd';ctx.lineWidth=2;ctx.strokeRect(x+1,y+1,w-2,h-2);
  ctx.fillStyle='#ccc';ctx.font='28px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🖼',x+w/2,y+h/2);
  ctx.textAlign='left';ctx.textBaseline='top';
}

function wrapText(ctx,text,fstr,maxW){
  const parts=text.replace(/\\n/g,'\n').split('\n');
  const lines=[];
  for(const part of parts){
    if(lines.length>=2)break;
    let cur='';ctx.font=fstr;
    for(const ch of part){
      const t=cur+ch;
      if(ctx.measureText(t).width>maxW&&cur){
        lines.push(cur);cur=ch;
        if(lines.length>=2)break;
      }else cur=t;
    }
    if(cur&&lines.length<2)lines.push(cur);
  }
  return lines.slice(0,2);
}

// ══ 헤더 ══════════════════════════════════════════════════════════════════════
function renderHeader(ctx,period,brand){
  ctx.font=`400 28px ${FONT}`;
  ctx.fillStyle=DATE_C;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(period,CW/2,DATE_CY);

  ctx.font=`800 80px ${FONT}`;
  const bw=ctx.measureText(brand).width, bh=80, brandCY=BRAND_Y+bh/2;
  ctx.font=`400 60px ${FONT}`;
  const xw=ctx.measureText('×').width;
  let lw=0;
  if(logoImg){const lh=82;lw=Math.round((logoImg.naturalWidth||logoImg.width)*lh/(logoImg.naturalHeight||logoImg.height));}
  const gap=32, totalW=bw+(logoImg?gap+xw+gap+lw:0), sx=Math.round((CW-totalW)/2);

  ctx.font=`800 80px ${FONT}`;ctx.fillStyle=WHITE;ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(brand,sx,BRAND_Y);
  if(logoImg){
    ctx.font=`400 60px ${FONT}`;ctx.fillStyle=WHITE;ctx.textBaseline='middle';
    ctx.fillText('×',sx+bw+gap,brandCY);
    ctx.drawImage(logoImg,sx+bw+gap+xw+gap,176,lw,82);
  }
  ctx.textAlign='left';ctx.textBaseline='top';
}

// ══ 상품 텍스트 블록 ══════════════════════════════════════════════════════════
function renderText(ctx,tx,ty,maxW,prod){
  // 상품명 (최대 2줄)
  const nf=`700 34px ${FONT}`;
  const lines=wrapText(ctx,prod.name||'',nf,maxW);
  ctx.font=nf;ctx.fillStyle=DARK;ctx.textBaseline='top';
  for(const l of lines){ctx.fillText(l,tx,ty);ty+=44;}
  ty+=10;

  // 색상명
  const color=(prod.color||'').trim();
  if(color){
    ctx.font=`400 22px ${FONT}`;ctx.fillStyle=GRAY;
    const cl=wrapText(ctx,color,`400 22px ${FONT}`,maxW);
    for(const l of cl){ctx.fillText(l,tx,ty);ty+=30;}
    ty+=10;
  }

  // 할인율 pill + 정가
  const disc=parseFloat(prod.discount)||0;
  const orig=parseInt(prod.original_price)||0;
  const sale=parseInt(prod.sale_price)||0;
  let rowY=ty,cx=tx,pillH=0;

  if(disc>0){
    const ds=`${Math.round(disc*100)}%`;
    ctx.font=`700 22px ${FONT}`;
    const dw=ctx.measureText(ds).width;
    pillH=34;const pillW=dw+22;
    rrect(ctx,cx,rowY,pillW,pillH,pillH/2,ORANGE);
    ctx.fillStyle=WHITE;ctx.textBaseline='middle';
    ctx.fillText(ds,cx+11,rowY+pillH/2);
    cx+=pillW+12;
  }
  if(orig>0){
    const os=orig.toLocaleString('ko-KR')+'원';
    ctx.font=`400 22px ${FONT}`;ctx.fillStyle=GRAY;
    const ow=ctx.measureText(os).width;
    const oy=pillH>0?rowY+(pillH-26)/2:rowY;
    ctx.textBaseline='top';ctx.fillText(os,cx,oy);
    ctx.strokeStyle=GRAY;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,oy+13);ctx.lineTo(cx+ow,oy+13);ctx.stroke();
  }
  if(pillH>0||orig>0) ty=rowY+Math.max(pillH,26)+12;

  // 할인가
  if(sale>0){
    ctx.font=`800 44px ${FONT}`;ctx.fillStyle=DARK;ctx.textBaseline='top';
    ctx.fillText(sale.toLocaleString('ko-KR')+'원',tx,ty);
  }
}

// ══ 흰색 박스 1개 (상품 1개) 렌더링 ══════════════════════════════════════════
// x1,y1,x2,y2: 박스 영역
function renderWhiteBox(ctx,x1,y1,x2,y2,prod,badgeColor,badgeTextColor,badgeSize){
  const cw=x2-x1, ch=y2-y1, pad=CARD_PAD;
  rrect(ctx,x1,y1,cw,ch,CARD_R,WHITE);

  const imgW=Math.round(cw*0.40), imgH=ch-pad*2;
  const ix=x1+pad, iy=y1+pad;
  const pimg=prodImgs[prod._pid];
  if(pimg) drawContain(ctx,pimg,ix,iy,imgW,imgH);
  else drawPH(ctx,ix,iy,imgW,imgH);

  const badge=(prod.badge||'').trim();
  if(badge){
    const bsz=Math.max(10,Math.min(badgeSize||20,60));
    ctx.font=`700 ${bsz}px ${FONT}`;
    const btw=ctx.measureText(badge).width;
    const bph=bsz+10, bpw=btw+20;
    rrect(ctx,ix,iy,bpw,bph,bph/2,badgeColor);
    ctx.fillStyle=badgeTextColor||WHITE;
    ctx.textBaseline='middle';
    ctx.fillText(badge,ix+10,iy+bph/2);
  }

  renderText(ctx,ix+imgW+30,y1+pad+8,x2-ix-imgW-30-pad,prod);
}

// ══ 카드 전체 렌더링 ══════════════════════════════════════════════════════════
function renderCardImage(ctx,products,bgColor,badgeColor,badgeTextColor,badgeSize){
  const bg=bgColor||BG, bc=badgeColor||ORANGE;
  const btc=badgeTextColor||WHITE, bsz=badgeSize||20;
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);
  renderHeader(ctx,
    document.getElementById('period').value,
    document.getElementById('brand').value);
  const n=products.length;if(!n)return;
  const avail=CH-HEADER_H-CARD_GAP-BOTTOM;
  const boxH=Math.floor((avail-(n-1)*CARD_GAP)/n);
  let cy=HEADER_H+CARD_GAP;
  for(const prod of products){
    renderWhiteBox(ctx,CARD_MX,cy,CW-CARD_MX,cy+boxH,prod,bc,btc,bsz);
    cy+=boxH+CARD_GAP;
  }
}

// 색상 밝기 판단 (hex → 밝으면 true)
function isLight(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>128;
}
</script>

<script>
// ══ 렌더링 ════════════════════════════════════════════════════════════════════
async function renderCurrent(){
  await fontReady;
  const cards=collectCards();
  const n=cards.length;
  updateNav(n);
  if(!n)return;
  const idx=Math.min(currentCard,n-1);
  currentCard=idx;
  const cv=document.getElementById('prev-canvas');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,CW,CH);
  const card=cards[idx];
  renderCardImage(ctx,card.products,card.bgColor,card.badgeColor,card.badgeTextColor,card.badgeSize);
}

function schedule(){clearTimeout(timer);timer=setTimeout(renderCurrent,500);}

function updateNav(n){
  document.getElementById('nav-info').textContent=`${currentCard+1} / ${Math.max(n,1)}`;
  document.getElementById('btn-prev').disabled=currentCard<=0;
  document.getElementById('btn-next').disabled=currentCard>=n-1;
}

function navigate(dir){
  const n=collectCards().length;
  currentCard=Math.max(0,Math.min(currentCard+dir,n-1));
  renderCurrent();
}

// ══ 색상 변경 감지 ════════════════════════════════════════════════════════════
function onColorChange(cid){ schedule(); }

// ══ 데이터 수집 ══════════════════════════════════════════════════════════════
function collectCards(){
  const cards=[];
  document.querySelectorAll('.card-block').forEach(block=>{
    const cid=block.id.replace('card-','');
    const bgColor=document.getElementById(`bg-color-${cid}`)?.value||'#F37E1F';
    const badgeColor=document.getElementById(`badge-color-${cid}`)?.value||'#F37E1F';
    const badgeTextColor=document.getElementById(`badge-text-color-${cid}`)?.value||'#ffffff';
    const badgeSize=parseInt(document.getElementById(`badge-size-${cid}`)?.value)||20;
    const prods=[];
    block.querySelectorAll('.prod-box').forEach(box=>{
      const pid=box.dataset.pid;
      prods.push({
        _pid:pid,
        name:document.getElementById(`name-${pid}`)?.value||'',
        color:document.getElementById(`color-${pid}`)?.value||'',
        badge:document.getElementById(`badge-${pid}`)?.value||'',
        discount:(parseFloat(document.getElementById(`disc-${pid}`)?.value)||0)/100,
        original_price:parseInt(document.getElementById(`orig-${pid}`)?.value)||0,
        sale_price:parseInt(document.getElementById(`sale-${pid}`)?.value)||0,
      });
    });
    if(prods.length)cards.push({products:prods, bgColor, badgeColor, badgeTextColor, badgeSize});
  });
  return cards;
}

// ══ 로고 ══════════════════════════════════════════════════════════════════════
document.getElementById('logo-file').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  document.getElementById('logo-name').textContent=file.name;
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{logoImg=img;schedule();};img.src=e.target.result;};
  r.readAsDataURL(file);
});

// ══ 카드 추가/삭제 ════════════════════════════════════════════════════════════
function addCard(){
  if(document.querySelectorAll('.card-block').length>=10){alert('카드는 최대 10장까지 가능합니다.');return;}
  cardSeq++;const cid=cardSeq;
  const el=document.createElement('div');
  el.className='card-block';el.id=`card-${cid}`;
  el.innerHTML=`
    <div class="card-head">
      <span class="card-title">🃏 카드 ${cid}</span>
      <div class="card-btns">
        <button class="b-ap" onclick="addProd(${cid})">＋ 상품 추가 (최대 3개)</button>
        <button class="btn b-rd" onclick="delCard(${cid})">✕ 삭제</button>
      </div>
    </div>
    <div class="color-row">
      <div class="color-item">
        배경색
        <input type="color" id="bg-color-${cid}" value="#F37E1F" oninput="onColorChange(${cid})">
      </div>
      <div class="color-item">
        뱃지색
        <input type="color" id="badge-color-${cid}" value="#F37E1F" oninput="onColorChange(${cid})">
      </div>
      <div class="color-item">
        뱃지 텍스트색
        <input type="color" id="badge-text-color-${cid}" value="#ffffff" oninput="onColorChange(${cid})">
      </div>
      <div class="color-item" style="margin-left:4px;color:#bbb;font-weight:400;font-size:10px">
        ※ 카드별 독립 설정
      </div>
    </div>
    <div class="card-body" id="cbody-${cid}"></div>`;
  document.getElementById('cards').appendChild(el);
  addProd(cid);
  // 새 카드로 이동
  currentCard=document.querySelectorAll('.card-block').length-1;
  schedule();
}

function delCard(cid){
  document.getElementById(`card-${cid}`)?.remove();
  const n=document.querySelectorAll('.card-block').length;
  currentCard=Math.max(0,Math.min(currentCard,n-1));
  schedule();
}

// ══ 상품 추가/삭제 ════════════════════════════════════════════════════════════
// 상품 추가 = 이 카드 안에 흰색 박스 1개 추가
function addProd(cid){
  const body=document.getElementById(`cbody-${cid}`);if(!body)return;
  const cnt=body.querySelectorAll('.prod-box').length;
  if(cnt>=3){alert('카드당 상품은 최대 3개까지 가능합니다.');return;}
  prodSeq++;const pid=prodSeq;
  const box=document.createElement('div');
  box.className='prod-box';box.id=`prod-${pid}`;box.dataset.pid=pid;
  box.innerHTML=`
    <div class="prod-box-num">상품 ${cnt+1}</div>
    <div class="prod-img-col">
      <label class="thumb" id="thumb-${pid}" for="imgf-${pid}">
        <span style="font-size:20px">📷</span><span>이미지 선택</span>
      </label>
      <input type="file" id="imgf-${pid}" accept="image/*" style="display:none" onchange="loadProdImg(${pid},this)">
    </div>
    <div class="prod-fields">
      <div class="full"><div class="flbl">상품명 (줄바꿈: \\n 또는 엔터)</div>
        <input type="text" id="name-${pid}" placeholder="예: 그래픽 반팔 티셔츠" oninput="schedule()"></div>
      <div class="full"><div class="flbl">색상명 / 상품설명</div>
        <input type="text" id="color-${pid}" placeholder="예: 오프화이트/블랙, 네이비/딥그린" oninput="schedule()"></div>
      <div class="full"><div class="flbl">뱃지 (없으면 비워두기)</div>
        <input type="text" id="badge-${pid}" placeholder="예: 세트상품" oninput="schedule()"></div>
      <div><div class="flbl">할인율 (%)</div>
        <input type="number" id="disc-${pid}" placeholder="58" min="0" max="100" oninput="schedule()"></div>
      <div><div class="flbl">정가 (원)</div>
        <input type="number" id="orig-${pid}" placeholder="80000" oninput="schedule()"></div>
      <div><div class="flbl">할인가 (원)</div>
        <input type="number" id="sale-${pid}" placeholder="34000" oninput="schedule()"></div>
    </div>
    <div class="prod-del"><button class="btn b-rd" onclick="delProd(${pid})">✕</button></div>`;
  body.appendChild(box);
  schedule();
}

function delProd(pid){
  document.getElementById(`prod-${pid}`)?.remove();
  delete prodImgs[pid];schedule();
}

function loadProdImg(pid,input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      prodImgs[pid]=img;
      const th=document.getElementById(`thumb-${pid}`);
      th.innerHTML=`<img src="${e.target.result}" alt="">`;
      th.style.border='none';schedule();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

// ══ 다운로드 / 전체보기 ══════════════════════════════════════════════════════
function fullView(){
  const cv=document.getElementById('prev-canvas');
  const w=window.open('','_blank','width=600,height=750');
  w.document.write(`<html><body style="margin:0;background:#000;display:flex;justify-content:center">
    <img src="${cv.toDataURL('image/jpeg',.95)}" style="max-height:100vh;max-width:100%"></body></html>`);
}

function downloadCurrent(){
  const cv=document.getElementById('prev-canvas');
  const a=document.createElement('a');
  a.download=`instagram_card_${currentCard+1}.jpg`;
  a.href=cv.toDataURL('image/jpeg',.95);a.click();
}

async function downloadAll(){
  const cards=collectCards();
  const cv=document.getElementById('prev-canvas');
  const ctx=cv.getContext('2d');
  for(let i=0;i<cards.length;i++){
    ctx.clearRect(0,0,CW,CH);
    const card=cards[i];
    renderCardImage(ctx,card.products,card.bgColor,card.badgeColor,card.badgeTextColor,card.badgeSize);
    await new Promise(r=>setTimeout(r,100));
    const a=document.createElement('a');
    a.download=`instagram_card_${i+1}.jpg`;
    a.href=cv.toDataURL('image/jpeg',.95);a.click();
    await new Promise(r=>setTimeout(r,300));
  }
  // 현재 카드로 복원
  renderCurrent();
}

// ══ 입력 감지 ══════════════════════════════════════════════════════════════════
document.getElementById('period').addEventListener('input',schedule);
document.getElementById('brand').addEventListener('input',schedule);

// ══ 초기화 ════════════════════════════════════════════════════════════════════
addCard();
renderCurrent();
</script>
</body>
</html>
